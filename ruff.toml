target-version = "py312"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line too long — géré par format
    "N999",  # invalid module name — on a des modules métier en français
]

[lint.per-file-ignores]
"tests/*" = ["N802", "N803"]  # noms test_xxx_YYY tolérés
"scripts/*" = ["T201"]         # print autorisé dans les scripts

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"
